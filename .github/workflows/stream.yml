name: Daily Podcast Stream

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 130

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tzdata fontconfig python3
          pip install gdown --upgrade --break-system-packages

      - name: Download Audio from Google Drive
        run: |
          gdown "1KjeJUeH3xIyK2SKVSAmhJSi4SgQa5MlQ" -O audio.bin
          ffprobe audio.bin 2>&1 | grep "Audio:"
          EXT=$(ffprobe -v error -select_streams a:0 \
            -show_entries stream=codec_name \
            -of default=noprint_wrappers=1:nokey=1 audio.bin)
          echo "Detected codec: $EXT"
          ffmpeg -i audio.bin -vn -acodec libmp3lame -q:a 2 audio_final.mp3
          echo "Converted to MP3 successfully"

      - name: Verify Audio
        run: |
          ls -lh audio_final.mp3
          ffprobe audio_final.mp3

      - name: Start Countdown Writer
        run: |
          python3 -c "
          import time
          total = 7200
          start = time.time()
          while True:
              elapsed = int(time.time() - start)
              remaining = max(0, total - elapsed)
              h = remaining // 3600
              m = (remaining % 3600) // 60
              s = remaining % 60
              text = f'{h:02d}:{m:02d}:{s:02d}'
              with open('/tmp/timer.txt', 'w') as f:
                  f.write(text)
              time.sleep(1)
          " &
          sleep 2
          cat /tmp/timer.txt

      - name: Stream to YouTube and Nimo TV
        run: |
          ffmpeg \
            -f lavfi -i color=c=black:s=1080x1920:r=30 \
            -stream_loop -1 -i audio_final.mp3 \
            -filter_complex "
              [1:a]showwaves=
                s=1080x300:
                mode=cline:
                rate=30:
                colors=0x00FFFF|0xFF00FF,
              format=yuv420p[wave];
              [0:v][wave]overlay=
                x=0:
                y=(H-h)/2+200[bg];
              [bg]drawtext=
                textfile=/tmp/timer.txt:
                reload=1:
                fontsize=180:
                fontcolor=white:
                borderw=5:
                bordercolor=black:
                shadowx=4:
                shadowy=4:
                shadowcolor=black@0.8:
                x=(w-tw)/2:
                y=(h-th)/2-200
            " \
            -c:v libx264 \
            -preset veryfast \
            -b:v 6800k \
            -maxrate 7500k \
            -bufsize 13600k \
            -pix_fmt yuv420p \
            -g 60 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -t 7200 \
            -map "[bg]" \
            -map 1:a \
            -f tee \
            "[f=flv:onfail=ignore]rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}|[f=flv:onfail=ignore]rtmp://ingest.nimo.tv/live/${{ secrets.NIMO_STREAM_KEY }}"
