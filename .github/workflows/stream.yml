name: Daily YouTube Stream

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 130

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tzdata fontconfig
          pip install gdown --upgrade --break-system-packages

      - name: Download Video from Google Drive
        run: |
          gdown "1oZ4dAQm1E3ngtYDhYSdZfksZP2aPTQEn" -O video.mp4

      - name: Verify Video Downloaded
        run: |
          ls -lh video.mp4
          ffprobe video.mp4

      - name: Start Clock Writer
        run: |
          while true; do
            TZ="Asia/Kolkata" date +"%I:%M:%S %p IST" > /tmp/clock.txt
            sleep 1
          done &

      - name: Stream to YouTube and Nimo TV
        run: |
          ffmpeg -re -stream_loop -1 \
            -i video.mp4 \
            -vf "drawtext=\
            textfile=/tmp/clock.txt:\
            reload=1:\
            fontsize=45:\
            fontcolor=white:\
            borderw=4:\
            bordercolor=black:\
            shadowx=3:\
            shadowy=3:\
            shadowcolor=black:\
            x=20:y=20" \
            -c:v libx264 \
            -preset veryfast \
            -b:v 6800k \
            -maxrate 7500k \
            -bufsize 13600k \
            -pix_fmt yuv420p \
            -g 60 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -t 7200 \
            -f tee \
            "[f=flv]rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}|[f=flv]rtmp://ingest.nimo.tv/live/${{ secrets.NIMO_STREAM_KEY }}"
