name: Daily YouTube Stream

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 130

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tzdata fontconfig python3
          pip install gdown --upgrade --break-system-packages

      - name: Download Video from Google Drive
        run: |
          gdown "1V_TVPN19epia51Litp-fHiD1KItn-J_D" -O video.mp4

      - name: Verify Video Downloaded
        run: |
          ls -lh video.mp4
          ffprobe video.mp4

      - name: Start Clock Writer
        run: |
          python3 -c "
          import time, os
          while True:
              t = time.strftime('%I:%M:%S %p IST', time.localtime())
              with open('/tmp/clock.txt', 'w') as f:
                  f.write(t)
              time.sleep(1)
          " &
          sleep 2
          cat /tmp/clock.txt

      - name: Stream to YouTube and Nimo TV
        run: |
          ffmpeg -re -stream_loop -1 \
            -i video.mp4 \
            -vf "drawtext=\
            textfile=/tmp/clock.txt:\
            reload=1:\
            fontsize=55:\
            fontcolor=white:\
            borderw=4:\
            bordercolor=black:\
            shadowx=3:\
            shadowy=3:\
            shadowcolor=black:\
            x=15:y=50" \
            -c:v libx264 \
            -preset veryfast \
            -b:v 6800k \
            -maxrate 7500k \
            -bufsize 13600k \
            -pix_fmt yuv420p \
            -g 60 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -t 7200 \
            -map 0:v -map 0:a \
            -f tee \
            "[f=flv:onfail=ignore]rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}|[f=flv:onfail=ignore]rtmp://ingest.nimo.tv/live/${{ secrets.NIMO_STREAM_KEY }}"
