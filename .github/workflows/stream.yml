name: Daily Podcast Stream

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 130

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tzdata fontconfig python3
          pip install gdown --upgrade --break-system-packages

      - name: Download Audio from Google Drive
        run: |
          gdown "1KjeJUeH3xIyK2SKVSAmhJSi4SgQa5MlQ" -O audio.bin
          ffmpeg -i audio.bin -vn -acodec libmp3lame -q:a 2 audio_final.mp3
          echo "Converted successfully"

      - name: Verify Audio
        run: |
          ls -lh audio_final.mp3
          ffprobe audio_final.mp3

      - name: Start Countdown Writer
        run: |
          python3 << 'EOF' &
          import time
          total = 7200
          start = time.time()
          while True:
              elapsed = int(time.time() - start)
              remaining = max(0, total - elapsed)
              h = remaining // 3600
              m = (remaining % 3600) // 60
              s = remaining % 60
              text = f'{h:02d}:{m:02d}:{s:02d}'
              with open('/tmp/timer.txt', 'w') as f:
                  f.write(text)
              time.sleep(1)
          EOF
          sleep 3
          echo "Timer:"
          cat /tmp/timer.txt

      - name: Stream to YouTube
        run: |
          ffmpeg \
            -re \
            -f lavfi -i color=c=0x1a1a2e:s=720x1280:r=24 \
            -stream_loop -1 -i audio_final.mp3 \
            -filter_complex \
            "[1:a]showfreqs=s=720x300:mode=bar:ascale=log:fscale=lin:colors=0x00cfff,format=yuv420p[freq];[0:v][freq]overlay=x=0:y=600[bg];[bg]drawtext=textfile=/tmp/timer.txt:reload=1:fontsize=120:fontcolor=white:borderw=3:bordercolor=black:x=(w-tw)/2:y=150[vout]" \
            -map "[vout]" \
            -map "1:a" \
            -c:v libx264 \
            -preset veryfast \
            -b:v 2500k \
            -maxrate 3000k \
            -bufsize 5000k \
            -pix_fmt yuv420p \
            -g 48 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -t 7200 \
            -f flv rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}
